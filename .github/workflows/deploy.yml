name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DO_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean
        env:
          DO_USER: ${{ secrets.DO_USER }}
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh $DO_USER@$DO_SERVER_IP << 'ENDSSH'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "Pulling latest changes..."
            git pull origin main

            echo "Building Docker images..."
            docker-compose build --no-cache api

            echo "Restarting services..."
            docker-compose down
            docker-compose up -d

            echo "Waiting for services to be healthy..."
            sleep 10

            echo "Checking API health..."
            docker-compose exec -T api node -e "require('http').get('http://localhost:3040/health', (r) => {console.log('Health check status:', r.statusCode); process.exit(r.statusCode === 200 ? 0 : 1)})" || true

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployment completed!"
          ENDSSH

      - name: Deployment Status
        if: success()
        run: echo "Deployment successful! API is live at https://api.sms.lancolatech.co.ke"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "Deployment failed! Check the logs above for details."
          exit 1

      - name: Notify on Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'Deployment successful',
              context: 'Deploy to DigitalOcean'
            })

      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Deployment failed',
              context: 'Deploy to DigitalOcean'
            })
